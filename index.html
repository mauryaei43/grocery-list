<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Grocery List</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FBF6EC;
    --card: #FFFFFF;
    --leaf: #2D5016;
    --leaf-light: #4a7a2a;
    --tomato: #C1440E;
    --turmeric: #E8A33D;
    --charcoal: #2B2B2B;
    --sage: #E4EEDC;
    --line: #E5DFCF;
    --muted: #8A8677;
    --amber-bg: #FCEFDA;
    --amber-line: #F0D6A6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito', sans-serif;
    background:var(--bg);
    color:var(--charcoal);
    min-height:100vh;
    padding-bottom:120px;
  }
  header{
    background:var(--leaf);
    color:#fff;
    padding:20px 20px 24px;
    border-radius:0 0 24px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    font-size:22px;
    font-weight:800;
    margin:0;
    display:flex;
    align-items:center;
    gap:10px;
  }
  header p{
    margin:4px 0 0;
    font-size:13px;
    color:#cfe0bf;
    font-weight:600;
  }
  .header-btns{display:flex; gap:8px; flex-shrink:0;}
  .header-btns button{
    background:rgba(255,255,255,0.18);
    border:none;
    color:#fff;
    width:44px;
    height:44px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .header-btns button:active{background:rgba(255,255,255,0.32);}
  main{
    max-width:520px;
    margin:0 auto;
    padding:16px;
  }
  .lang-row{
    display:flex;
    gap:8px;
    margin:14px 0 16px;
    overflow-x:auto;
    padding-bottom:2px;
    scrollbar-width:none;
  }
  .lang-row::-webkit-scrollbar{display:none;}
  .lang-pill{
    border:2px solid var(--line);
    background:var(--card);
    color:var(--muted);
    font-weight:700;
    font-size:14px;
    padding:6px 16px;
    border-radius:999px;
    cursor:pointer;
    font-family:inherit;
    flex-shrink:0;
    white-space:nowrap;
  }
  .lang-pill.active{
    border-color:var(--leaf);
    background:var(--sage);
    color:var(--leaf);
  }
  .input-row{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:18px;
  }
  #textInput{
    flex:1;
    height:52px;
    border-radius:16px;
    border:2px solid var(--line);
    background:var(--card);
    padding:0 16px;
    font-size:18px;
    font-family:inherit;
    color:var(--charcoal);
  }
  #textInput:focus{outline:none;border-color:var(--leaf-light);}
  #addBtn{
    width:52px;
    height:52px;
    border-radius:16px;
    border:none;
    background:var(--leaf);
    color:#fff;
    font-size:26px;
    line-height:1;
    cursor:pointer;
    flex-shrink:0;
  }
  #addBtn:active{background:var(--leaf-light);}
  .mic-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:6px;
  }
  #micBtn{
    position:relative;
    width:88px;
    height:96px;
    border:none;
    background:none;
    cursor:pointer;
    padding:0;
  }
  #micBtn .bulb{
    width:76px;
    height:76px;
    border-radius:50% 50% 48% 48%;
    background:var(--turmeric);
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform 0.15s ease;
  }
  #micBtn.listening .bulb{
    background:var(--tomato);
    animation:pulse 1s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
  }
  #micBtn .ring{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:2px solid var(--tomato);
    opacity:0;
  }
  #micBtn.listening .ring{
    animation:ring 1.2s ease-out infinite;
  }
  @keyframes ring{
    0%{opacity:0.6; transform:scale(0.8);}
    100%{opacity:0; transform:scale(1.5);}
  }
  #micLabel{
    text-align:center;
    font-size:13px;
    font-weight:700;
    color:var(--muted);
    margin:-4px 0 20px;
  }
  #micBtn.listening + #micLabel{color:var(--tomato);}

  .suggest-box{
    background:var(--amber-bg);
    border:2px solid var(--amber-line);
    border-radius:16px;
    padding:14px;
    margin-bottom:18px;
  }
  .suggest-title{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:15px;
    font-weight:800;
    color:#7a5211;
    margin-bottom:2px;
  }
  .suggest-sub{
    font-size:12px;
    color:#96703a;
    font-weight:600;
    margin-bottom:10px;
  }
  .suggest-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:#fff;
    border-radius:12px;
    padding:10px 12px;
    margin-bottom:8px;
  }
  .suggest-row:last-child{margin-bottom:0;}
  .suggest-name{font-size:15px; font-weight:700; color:var(--tomato);}
  .suggest-meta{font-size:12px; color:var(--muted); font-weight:600;}
  .suggest-add{
    width:34px;
    height:34px;
    border-radius:10px;
    border:none;
    background:var(--leaf);
    color:#fff;
    font-size:20px;
    flex-shrink:0;
    cursor:pointer;
  }

  .empty-state{
    text-align:center;
    padding:40px 20px;
    color:var(--muted);
  }
  .empty-state svg{margin-bottom:12px;}
  .empty-state p{font-size:16px; font-weight:600; margin:0;}
  ul#list{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  li.item{
    background:var(--card);
    border:2px solid var(--line);
    border-radius:16px;
    padding:12px 12px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  li.item.done{
    background:var(--sage);
    border-color:var(--sage);
  }
  .check{
    width:34px;
    height:34px;
    border-radius:50%;
    border:2.5px solid var(--leaf);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    background:#fff;
  }
  li.item.done .check{background:var(--leaf);}
  .check svg{opacity:0;}
  li.item.done .check svg{opacity:1;}
  .item-text{
    flex:1;
    font-size:18px;
    font-weight:700;
    color:var(--charcoal);
    word-break:break-word;
    outline:none;
    padding:4px 2px;
    border-radius:8px;
  }
  .item-text[contenteditable="true"]{background:#fff8e6;}
  li.item.done .item-text{text-decoration:line-through; color:var(--muted);}
  .icon-btn{
    width:38px;
    height:38px;
    border-radius:10px;
    border:none;
    background:transparent;
    color:var(--muted);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-shrink:0;
  }
  .icon-btn:active{background:var(--line);}
  .icon-btn.delete:active{background:#fbe1d6; color:var(--tomato);}
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    background:var(--leaf);
    color:#fff;
    padding:10px 20px;
    border-radius:999px;
    font-size:14px;
    font-weight:700;
    opacity:0;
    transition:opacity 0.25s ease;
    pointer-events:none;
    white-space:nowrap;
  }
  .toast.show{opacity:1;}
  .counter{
    text-align:center;
    font-size:13px;
    color:var(--muted);
    font-weight:700;
    margin:16px 0 6px;
  }

  .prev-strip{margin-bottom:16px;}
  .prev-title{font-size:12px; font-weight:700; color:var(--muted); margin-bottom:8px;}
  .prev-chips{
    display:flex;
    gap:8px;
    overflow-x:auto;
    scrollbar-width:none;
    padding-bottom:2px;
  }
  .prev-chips::-webkit-scrollbar{display:none;}
  .prev-chip{
    flex-shrink:0;
    border:2px solid var(--line);
    background:var(--card);
    color:var(--charcoal);
    font-weight:700;
    font-size:13px;
    padding:8px 12px;
    border-radius:12px;
    cursor:pointer;
    font-family:inherit;
    white-space:nowrap;
  }
  #refPanel{
    display:none;
    margin-bottom:18px;
    background:var(--card);
    border:2px solid var(--line);
    border-radius:16px;
    padding:14px;
  }
  #refPanel.open{display:block;}
  #refPanel h2{font-size:16px; font-weight:800; margin:0 0 12px;}
  .ref-tabs{
    display:flex;
    gap:6px;
    overflow-x:auto;
    margin-bottom:12px;
    scrollbar-width:none;
    padding-bottom:2px;
  }
  .ref-tabs::-webkit-scrollbar{display:none;}
  .ref-tab{
    flex-shrink:0;
    border:2px solid var(--line);
    background:var(--bg);
    color:var(--muted);
    font-weight:700;
    font-size:13px;
    padding:7px 14px;
    border-radius:999px;
    cursor:pointer;
    font-family:inherit;
    white-space:nowrap;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .ref-tab.active{border-color:var(--leaf); background:var(--sage); color:var(--leaf);}
  .ref-chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .ref-chip{
    border:2px solid var(--line);
    background:var(--bg);
    color:var(--charcoal);
    font-weight:700;
    font-size:13px;
    padding:8px 12px;
    border-radius:12px;
    cursor:pointer;
    font-family:inherit;
  }
  .ref-chip.added{
    background:var(--sage);
    border-color:var(--sage);
    color:var(--leaf-light);
    text-decoration:line-through;
  }
  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:50;
  }
  .modal-overlay.open{display:flex;}
  .modal-card{
    background:var(--card);
    border-radius:18px;
    padding:20px;
    width:100%;
    max-width:360px;
  }
  .modal-card h3{
    font-size:17px;
    font-weight:800;
    margin:0 0 14px;
  }
  .modal-field{margin-bottom:12px;}
  .modal-field label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--muted);
    margin-bottom:5px;
  }
  .modal-field input{
    width:100%;
    height:46px;
    border-radius:12px;
    border:2px solid var(--line);
    padding:0 14px;
    font-size:16px;
    font-family:inherit;
    color:var(--charcoal);
  }
  .modal-field input:focus{outline:none; border-color:var(--leaf-light);}
  .modal-btns{display:flex; gap:10px; margin-top:16px;}
  .modal-btns button{
    flex:1;
    height:46px;
    border-radius:12px;
    border:none;
    font-weight:800;
    font-size:15px;
    font-family:inherit;
    cursor:pointer;
  }
  #modalCancel{background:var(--bg); color:var(--muted); border:2px solid var(--line);}
  #modalConfirm{background:var(--leaf); color:#fff;}
  #historyPanel{
    display:none;
    margin-top:20px;
    border-top:2px solid var(--line);
    padding-top:16px;
  }
  #historyPanel.open{display:block;}
  .cal-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .cal-nav button{
    background:var(--bg);
    border:2px solid var(--line);
    border-radius:10px;
    width:36px;
    height:36px;
    font-size:16px;
    font-weight:800;
    color:var(--leaf);
    cursor:pointer;
    font-family:inherit;
  }
  .cal-nav span{font-weight:800; font-size:15px;}
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7, minmax(0,1fr));
    gap:4px;
    margin-bottom:14px;
  }
  .cal-dow{text-align:center; font-size:11px; font-weight:700; color:var(--muted); padding:4px 0;}
  .cal-day{
    aspect-ratio:1;
    border:none;
    background:var(--bg);
    border-radius:10px;
    font-size:13px;
    font-weight:700;
    color:var(--charcoal);
    cursor:pointer;
    position:relative;
    font-family:inherit;
  }
  .cal-day.has-event::after{
    content:'';
    position:absolute;
    bottom:4px;
    left:50%;
    transform:translateX(-50%);
    width:5px;
    height:5px;
    border-radius:50%;
    background:var(--tomato);
  }
  .cal-day.is-today{border:2px solid var(--leaf);}
  .cal-day.selected{background:var(--leaf); color:#fff;}
  .cal-day.selected.has-event::after{background:#fff;}
  .cal-day-label{font-weight:800; font-size:14px; margin:4px 0 8px;}
  #historyPanel h2{
    font-size:16px;
    font-weight:800;
    margin:0 0 12px;
  }
  .month-block{
    background:var(--card);
    border:2px solid var(--line);
    border-radius:14px;
    margin-bottom:10px;
    overflow:hidden;
  }
  .month-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 14px;
    cursor:pointer;
    font-weight:700;
    font-size:15px;
  }
  .month-head .chev{transition:transform 0.15s ease; color:var(--muted);}
  .month-block.open .chev{transform:rotate(180deg);}
  .month-items{
    display:none;
    padding:0 14px 12px;
  }
  .month-block.open .month-items{display:block;}
  .month-item-row{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    padding:5px 0;
    border-top:1px solid var(--line);
  }
  .month-item-row:first-child{border-top:none;}
  .month-item-row span:last-child{color:var(--muted); font-weight:700;}
  .no-history{color:var(--muted); font-size:14px; font-weight:600; text-align:center; padding:12px 0;}
</style>
</head>
<body>

<header>
  <div>
    <h1>
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      My Grocery List
    </h1>
    <p id="dateLabel"></p>
  </div>
  <div class="header-btns">
    <button id="refBtn" aria-label="Browse common items">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg>
    </button>
    <button id="historyBtn" aria-label="View past months">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
    </button>
    <button id="shareBtn" aria-label="Share list">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 3.9M15.4 6.6 8.6 10.5"/></svg>
    </button>
  </div>
</header>

<main>
  <div class="lang-row" id="langRow">
    <button class="lang-pill active" data-lang="en-IN">English</button>
    <button class="lang-pill" data-lang="hi-IN">हिंदी</button>
    <button class="lang-pill" data-lang="gu-IN">ગુજરાતી</button>
    <button class="lang-pill" data-lang="mr-IN">मराठी</button>
    <button class="lang-pill" data-lang="bn-IN">বাংলা</button>
    <button class="lang-pill" data-lang="pa-IN">ਪੰਜਾਬੀ</button>
    <button class="lang-pill" data-lang="ta-IN">தமிழ்</button>
    <button class="lang-pill" data-lang="te-IN">తెలుగు</button>
    <button class="lang-pill" data-lang="kn-IN">ಕನ್ನಡ</button>
    <button class="lang-pill" data-lang="ml-IN">മലയാളം</button>
    <button class="lang-pill" data-lang="ur-IN">اردو</button>
  </div>

  <div class="input-row">
    <input id="textInput" type="text" placeholder="Type an item, like Tomato 2 kg" />
    <button id="addBtn" aria-label="Add item">+</button>
  </div>

  <div class="mic-wrap">
    <button id="micBtn" aria-label="Add item by speaking">
      <span class="ring"></span>
      <span class="bulb">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#2B2B2B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19v3"/><path d="M8 22h8"/><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/></svg>
      </span>
    </button>
  </div>
  <div id="micLabel">Tap and speak to add</div>

  <div id="prevStrip" class="prev-strip" style="display:none;">
    <div class="prev-title">Previously added &mdash; tap to add again</div>
    <div class="prev-chips" id="prevChips"></div>
  </div>

  <div id="refPanel">
    <h2>Browse common items</h2>
    <div class="ref-tabs" id="refTabs"></div>
    <div class="ref-chips" id="refChips"></div>
  </div>

  <div id="suggestBox" class="suggest-box" style="display:none;">
    <div class="suggest-title">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#7a5211" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.2 1 2.3h6c0-1.1.4-1.8 1-2.3A7 7 0 0 0 12 2Z"/></svg>
      You may need soon
    </div>
    <div class="suggest-sub">Based on how often you've bought these before</div>
    <div id="suggestList"></div>
  </div>

  <div id="counter" class="counter" style="display:none;"></div>

  <div id="emptyState" class="empty-state">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#8A8677" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    <p>Your list is empty.<br>Tap the mic or type to add something.</p>
  </div>

  <ul id="list"></ul>

  <div id="historyPanel">
    <h2>Calendar</h2>
    <div class="cal-nav">
      <button id="calPrev" aria-label="Previous month">&lt;</button>
      <span id="calMonthLabel"></span>
      <button id="calNext" aria-label="Next month">&gt;</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div id="calDayItems"></div>
    <h2 style="margin-top:20px;">Past months</h2>
    <div id="historyList"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card">
    <h3 id="modalItemName">Add item</h3>
    <div class="modal-field">
      <label for="modalQty">Quantity (optional)</label>
      <input id="modalQty" type="text" placeholder="e.g. 2 kg, 1 packet, 500 ml" />
    </div>
    <div class="modal-field" id="modalBrandField">
      <label for="modalBrand">Brand or specific name (optional)</label>
      <input id="modalBrand" type="text" placeholder="e.g. Lifebuoy, Fortune, Tata" />
    </div>
    <div class="modal-btns">
      <button id="modalCancel">Cancel</button>
      <button id="modalConfirm">Add to list</button>
    </div>
    <button id="modalRemove" style="display:none; width:100%; margin-top:10px; background:none; border:none; color:var(--tomato); font-weight:700; font-size:14px; padding:6px; cursor:pointer; font-family:inherit;">Remove from list</button>
  </div>
</div>

<script>
(function(){
  window.storage = {
    get: function(key){
      return new Promise(function(resolve){
        try{
          var v = localStorage.getItem(key);
          if(v === null){ resolve(null); return; }
          resolve({ key: key, value: v });
        }catch(e){ resolve(null); }
      });
    },
    set: function(key, value){
      return new Promise(function(resolve){
        try{
          localStorage.setItem(key, value);
          resolve({ key: key, value: value });
        }catch(e){ resolve(null); }
      });
    },
    delete: function(key){
      return new Promise(function(resolve){
        try{ localStorage.removeItem(key); resolve({ key: key, deleted: true }); }
        catch(e){ resolve(null); }
      });
    }
  };
})();
</script>
<script>
(function(){
  var ITEMS_KEY = 'grocery-list-items';
  var HISTORY_KEY = 'grocery-purchase-history';
  var ADDED_LOG_KEY = 'grocery-all-added-log';
  var ADD_EVENTS_KEY = 'grocery-add-events-log';
  var items = [];
  var history = [];
  var allAdded = [];
  var addEvents = [];
  var recognition = null;
  var currentLang = 'en-IN';
  var isListening = false;

  var listEl = document.getElementById('list');
  var emptyEl = document.getElementById('emptyState');
  var counterEl = document.getElementById('counter');
  var textInput = document.getElementById('textInput');
  var addBtn = document.getElementById('addBtn');

  var micLabel = document.getElementById('micLabel');
  var shareBtn = document.getElementById('shareBtn');
  var historyBtn = document.getElementById('historyBtn');
  var historyPanel = document.getElementById('historyPanel');
  var historyListEl = document.getElementById('historyList');
  var calPrev = document.getElementById('calPrev');
  var calNext = document.getElementById('calNext');
  var calMonthLabel = document.getElementById('calMonthLabel');
  var calGrid = document.getElementById('calGrid');
  var calDayItems = document.getElementById('calDayItems');
  var calDate = new Date();
  var selectedDay = null;
  var toastEl = document.getElementById('toast');
  var dateLabel = document.getElementById('dateLabel');
  var suggestBox = document.getElementById('suggestBox');
  var suggestListEl = document.getElementById('suggestList');
  var prevStrip = document.getElementById('prevStrip');
  var prevChips = document.getElementById('prevChips');
  var refBtn = document.getElementById('refBtn');
  var refPanel = document.getElementById('refPanel');
  var refTabs = document.getElementById('refTabs');
  var refChips = document.getElementById('refChips');
  var activeRefCategory = 'Vegetables';
  var modalOverlay = document.getElementById('modalOverlay');
  var modalItemName = document.getElementById('modalItemName');
  var modalQty = document.getElementById('modalQty');
  var modalBrand = document.getElementById('modalBrand');
  var modalBrandField = document.getElementById('modalBrandField');
  var modalCancel = document.getElementById('modalCancel');
  var modalConfirm = document.getElementById('modalConfirm');
  var modalRemove = document.getElementById('modalRemove');
  var pendingRefName = null;
  var pendingEditItem = null;

  var REFERENCE_ITEMS = {
    'Vegetables': [
      'Onion (प्याज)', 'Potato (आलू)', 'Tomato (टमाटर)', 'Garlic (लहसुन)', 'Ginger (अदरक)',
      'Green chili (हरी मिर्च)', 'Coriander leaves (धनिया)', 'Curry leaves', 'Brinjal (बैंगन)',
      'Cauliflower (फूलगोभी)', 'Cabbage (पत्तागोभी)', 'Capsicum (शिमला मिर्च)', 'Lady finger / Bhindi',
      'Bottle gourd / Lauki', 'Ridge gourd / Turai', 'Bitter gourd / Karela', 'Cucumber (खीरा)',
      'Carrot (गाजर)', 'Green beans', 'Green peas (मटर)', 'Spinach / Palak', 'Fenugreek leaves / Methi',
      'Pumpkin (कद्दू)', 'Radish (मूली)', 'Beetroot (चुकंदर)', 'Drumstick (सहजन)', 'Sweet potato (शकरकंद)',
      'Lemon (नींबू)', 'Raw banana (कच्चा केला)', 'Mint leaves (पुदीना)'
    ],
    'Groceries': [
      'Rice', 'Wheat flour / Atta', 'Sugar', 'Salt', 'Cooking oil', 'Ghee', 'Toor dal', 'Moong dal',
      'Chana dal', 'Masoor dal', 'Urad dal', 'Besan / Gram flour', 'Turmeric powder', 'Red chili powder',
      'Coriander powder', 'Cumin seeds', 'Mustard seeds', 'Garam masala', 'Tea leaves', 'Coffee powder',
      'Milk', 'Curd / Yogurt', 'Paneer', 'Bread', 'Eggs', 'Poha', 'Suji / Rava', 'Papad', 'Pickle / Achar',
      'Jaggery / Gud', 'Vermicelli', 'Biscuits', 'Ketchup', 'Butter', 'Bread jam', 'Salt-free snacks',
      'Cooking gas cylinder'
    ],
    'Sanitary and household': [
      'Bathing soap', 'Shampoo', 'Toothpaste', 'Toothbrush', 'Detergent powder', 'Dishwash bar',
      'Dishwash liquid', 'Toilet cleaner', 'Phenyl / Floor cleaner', 'Sanitary pads', 'Hand wash',
      'Hand sanitizer', 'Room freshener', 'Mosquito repellent', 'Garbage bags', 'Tissue paper',
      'Toilet paper', 'Hair oil', 'Comb', 'Razor', 'Shaving cream', 'Naphthalene balls', 'Broom',
      'Mop', 'Matchbox', 'Candles', 'Agarbatti / Incense sticks', 'Cotton', 'Nail cutter'
    ],
    'Other essentials': [
      'Batteries', 'LED bulb', 'Newspaper', 'Notebook', 'Pen', 'Baby diapers', 'Baby food', 'Pet food',
      'Water bottle', 'Water filter candle', 'Aluminium foil', 'Plastic wrap', 'Zip pouches',
      'Paper napkins', 'Disposable plates', 'Shoe polish', 'Sewing kit', 'First aid items'
    ]
  };

  dateLabel.textContent = new Date().toLocaleDateString(undefined, { weekday:'long', month:'short', day:'numeric' });

  function uid(){ return 'i' + Date.now() + Math.floor(Math.random()*1000); }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function normalize(t){ return t.trim().toLowerCase().replace(/\s+/g,' '); }
  function daysBetween(a,b){
    var d1 = new Date(a), d2 = new Date(b);
    return Math.round((d2 - d1) / 86400000);
  }
  function monthKey(iso){ return iso.slice(0,7); }
  function monthLabel(key){
    var parts = key.split('-');
    var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, 1);
    return d.toLocaleDateString(undefined, { month:'long', year:'numeric' });
  }

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(function(){ toastEl.classList.remove('show'); }, 1600);
  }

  async function loadAll(){
    try{
      var res = await window.storage.get(ITEMS_KEY, false);
      if(res && res.value) items = JSON.parse(res.value);
    }catch(e){ items = []; }
    try{
      var res2 = await window.storage.get(HISTORY_KEY, false);
      if(res2 && res2.value) history = JSON.parse(res2.value);
    }catch(e){ history = []; }
    try{
      var res3 = await window.storage.get(ADDED_LOG_KEY, false);
      if(res3 && res3.value) allAdded = JSON.parse(res3.value);
    }catch(e){ allAdded = []; }
    try{
      var res4 = await window.storage.get(ADD_EVENTS_KEY, false);
      if(res4 && res4.value) addEvents = JSON.parse(res4.value);
    }catch(e){ addEvents = []; }
    render();
  }

  async function saveItems(){
    try{ await window.storage.set(ITEMS_KEY, JSON.stringify(items), false); }
    catch(e){ showToast("Couldn't save. Try again."); }
  }
  async function saveHistory(){
    try{ await window.storage.set(HISTORY_KEY, JSON.stringify(history), false); }
    catch(e){ showToast("Couldn't save history."); }
  }
  async function saveAddedLog(){
    try{ await window.storage.set(ADDED_LOG_KEY, JSON.stringify(allAdded), false); }
    catch(e){}
  }
  async function saveAddEvents(){
    try{ await window.storage.set(ADD_EVENTS_KEY, JSON.stringify(addEvents), false); }
    catch(e){}
  }
  function logAddEvent(text){
    addEvents.push({ date: todayISO(), text: text });
    if(addEvents.length > 2000) addEvents = addEvents.slice(addEvents.length - 2000);
    saveAddEvents();
  }
  function logAdded(text){
    var key = normalize(text.split(' - ')[0].split(' (')[0]);
    var display = text.split(' - ')[0];
    allAdded = allAdded.filter(function(a){ return a.key !== key; });
    allAdded.unshift({ key: key, text: display, at: Date.now() });
    if(allAdded.length > 40) allAdded = allAdded.slice(0, 40);
    saveAddedLog();
  }

  function computeSuggestions(){
    var groups = {};
    history.forEach(function(h){
      if(!groups[h.name]) groups[h.name] = { text: h.text, dates: [] };
      groups[h.name].dates.push(h.date);
      groups[h.name].text = h.text;
    });
    var activeNames = {};
    items.forEach(function(i){ if(!i.done) activeNames[normalize(i.text)] = true; });

    var today = todayISO();
    var suggestions = [];
    Object.keys(groups).forEach(function(name){
      if(activeNames[name]) return;
      var dates = groups[name].dates.slice().sort();
      if(dates.length < 2) return;
      var intervals = [];
      for(var k=1;k<dates.length;k++){
        intervals.push(daysBetween(dates[k-1], dates[k]));
      }
      var avg = Math.round(intervals.reduce(function(a,b){return a+b;},0) / intervals.length);
      if(avg <= 0) avg = 1;
      var last = dates[dates.length-1];
      var since = daysBetween(last, today);
      var ratio = since / avg;
      if(ratio >= 0.7){
        suggestions.push({
          name: name,
          text: groups[name].text,
          avg: avg,
          since: since,
          ratio: ratio,
          overdue: ratio >= 1
        });
      }
    });
    suggestions.sort(function(a,b){ return b.ratio - a.ratio; });
    return suggestions.slice(0, 6);
  }

  function renderSuggestions(){
    var sugg = computeSuggestions();
    if(sugg.length === 0){
      suggestBox.style.display = 'none';
      return;
    }
    suggestBox.style.display = 'block';
    suggestListEl.innerHTML = '';
    sugg.forEach(function(s){
      var row = document.createElement('div');
      row.className = 'suggest-row';
      var left = document.createElement('div');
      var nameEl = document.createElement('div');
      nameEl.className = 'suggest-name';
      nameEl.textContent = s.text;
      var metaEl = document.createElement('div');
      metaEl.className = 'suggest-meta';
      metaEl.textContent = 'usually every ~' + s.avg + ' days \u00b7 last bought ' + s.since + ' days ago' + (s.overdue ? ' \u00b7 likely finished' : '');
      left.appendChild(nameEl);
      left.appendChild(metaEl);
      var addB = document.createElement('button');
      addB.className = 'suggest-add';
      addB.setAttribute('aria-label', 'Add to list');
      addB.textContent = '+';
      addB.onclick = function(){
        addItem(s.text);
        showToast('Added ' + s.text);
      };
      row.appendChild(left);
      row.appendChild(addB);
      suggestListEl.appendChild(row);
    });
  }

  function render(){
    listEl.innerHTML = '';
    if(items.length === 0){
      emptyEl.style.display = 'block';
      counterEl.style.display = 'none';
    }else{
      emptyEl.style.display = 'none';
      var doneCount = items.filter(function(i){ return i.done; }).length;
      counterEl.style.display = 'block';
      counterEl.textContent = doneCount + ' of ' + items.length + ' picked up';

      items.forEach(function(item){
        var li = document.createElement('li');
        li.className = 'item' + (item.done ? ' done' : '');

        var check = document.createElement('button');
        check.className = 'check';
        check.setAttribute('aria-label', 'Mark as picked up');
        check.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
        check.onclick = function(){ toggleDone(item.id); };

        var span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;
        span.onclick = function(){ startEdit(span, item.id); };

        var editBtn = document.createElement('button');
        editBtn.className = 'icon-btn';
        editBtn.setAttribute('aria-label', 'Edit item');
        editBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
        editBtn.onclick = function(){ startEdit(span, item.id); };

        var delBtn = document.createElement('button');
        delBtn.className = 'icon-btn delete';
        delBtn.setAttribute('aria-label', 'Erase item');
        delBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>';
        delBtn.onclick = function(){ deleteItem(item.id); };

        li.appendChild(check);
        li.appendChild(span);
        li.appendChild(editBtn);
        li.appendChild(delBtn);
        listEl.appendChild(li);
      });
    }
    renderSuggestions();
    renderPrevStrip();
    if(refPanel.classList.contains('open')) renderRefChips();
  }

  function renderPrevStrip(){
    var activeKeys = {};
    items.forEach(function(i){
      activeKeys[normalize(i.text.split(' - ')[0].split(' (')[0])] = true;
    });
    var overlooked = allAdded.filter(function(a){ return !activeKeys[a.key]; }).slice(0, 20);
    if(overlooked.length === 0){
      prevStrip.style.display = 'none';
      return;
    }
    prevStrip.style.display = 'block';
    prevChips.innerHTML = '';
    overlooked.forEach(function(a){
      var chip = document.createElement('button');
      chip.className = 'prev-chip';
      chip.textContent = a.text;
      chip.onclick = function(){ addItem(a.text); showToast('Added ' + a.text); };
      prevChips.appendChild(chip);
    });
  }

  function addItem(text){
    text = (text || '').trim();
    if(!text) return;
    items.unshift({ id: uid(), text: text, done: false });
    logAdded(text);
    logAddEvent(text);
    saveItems();
    render();
  }

  function toggleDone(id){
    var item = items.find(function(i){ return i.id === id; });
    if(!item) return;
    item.done = !item.done;
    if(item.done){
      history.push({ name: normalize(item.text), text: item.text, date: todayISO() });
      saveHistory();
    }else{
      var today = todayISO();
      var name = normalize(item.text);
      for(var k=history.length-1; k>=0; k--){
        if(history[k].name === name && history[k].date === today){
          history.splice(k,1);
          break;
        }
      }
      saveHistory();
    }
    saveItems();
    render();
  }

  function deleteItem(id){
    items = items.filter(function(i){ return i.id !== id; });
    saveItems();
    render();
  }

  function startEdit(span, id){
    span.setAttribute('contenteditable', 'true');
    span.focus();
    document.execCommand('selectAll', false, null);
    function finish(){
      span.removeAttribute('contenteditable');
      var newText = span.textContent.trim();
      if(!newText){ deleteItem(id); return; }
      var item = items.find(function(i){ return i.id === id; });
      if(item){ item.text = newText; saveItems(); render(); }
      span.removeEventListener('blur', finish);
      span.removeEventListener('keydown', onKey);
    }
    function onKey(e){ if(e.key === 'Enter'){ e.preventDefault(); span.blur(); } }
    span.addEventListener('blur', finish);
    span.addEventListener('keydown', onKey);
  }

  addBtn.onclick = function(){ addItem(textInput.value); textInput.value=''; textInput.focus(); };
  textInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ addItem(textInput.value); textInput.value=''; }
  });

  document.getElementById('langRow').addEventListener('click', function(e){
    var btn = e.target.closest('.lang-pill');
    if(!btn) return;
    document.querySelectorAll('.lang-pill').forEach(function(p){ p.classList.remove('active'); });
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
  });

  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  var userStopped = false;

  if(SpeechRecognition){
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onresult = function(event){
      for(var k = event.resultIndex; k < event.results.length; k++){
        if(event.results[k].isFinal){
          var transcript = event.results[k][0].transcript;
          addItem(transcript);
          showToast('Added: ' + transcript);
        }
      }
    };
    recognition.onerror = function(e){
      if(e.error === 'no-speech' || e.error === 'aborted'){ return; }
      showToast("Couldn't hear that. Try again.");
    };
    recognition.onend = function(){
      if(isListening && !userStopped){
        try{ recognition.start(); }
        catch(e){ stopListening(); }
      }else{
        stopListening();
      }
    };
    micBtn.onclick = function(){
      if(isListening){
        userStopped = true;
        recognition.stop();
        return;
      }
      userStopped = false;
      recognition.lang = currentLang;
      try{
        recognition.start();
        isListening = true;
        micBtn.classList.add('listening');
        micLabel.textContent = 'Listening... tap to stop';
      }catch(e){ showToast('Could not start microphone.'); }
    };
  }else{
    micLabel.textContent = 'Voice input not supported in this browser';
    micBtn.style.opacity = '0.4';
    micBtn.disabled = true;
  }
  function stopListening(){
    isListening = false;
    micBtn.classList.remove('listening');
    micLabel.textContent = 'Tap and speak to add';
  }

  shareBtn.onclick = async function(){
    if(items.length === 0){ showToast('Nothing to share yet.'); return; }
    var lines = items.map(function(i){ return (i.done ? '[x] ' : '[ ] ') + i.text; });
    var text = 'Grocery list:\n' + lines.join('\n');
    if(navigator.share){
      try{ await navigator.share({ text: text, title: 'My Grocery List' }); }catch(e){}
    }else if(navigator.clipboard){
      try{ await navigator.clipboard.writeText(text); showToast('Copied to clipboard'); }
      catch(e){ showToast('Could not copy.'); }
    }else{
      window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
    }
  };

  function renderRefTabs(){
    refTabs.innerHTML = '';
    Object.keys(REFERENCE_ITEMS).forEach(function(cat){
      var tab = document.createElement('button');
      tab.className = 'ref-tab' + (cat === activeRefCategory ? ' active' : '');
      tab.textContent = cat;
      tab.onclick = function(){ activeRefCategory = cat; renderRefTabs(); renderRefChips(); };
      refTabs.appendChild(tab);
    });
  }

  function renderRefChips(){
    refChips.innerHTML = '';
    var list = REFERENCE_ITEMS[activeRefCategory] || [];
    list.forEach(function(name){
      var base = normalize(name.split(' (')[0]);
      var existing = items.find(function(i){ return i.refBase === base; });
      var chip = document.createElement('button');
      chip.className = 'ref-chip' + (existing ? ' added' : '');
      chip.textContent = existing ? (name + ' \u2713') : name;
      chip.onclick = function(){ openQtyModal(name, base); };
      refChips.appendChild(chip);
    });
  }

  function openQtyModal(name, base){
    pendingRefName = name;
    var isVeg = activeRefCategory === 'Vegetables';
    modalBrandField.style.display = isVeg ? 'none' : 'block';
    var existing = items.find(function(i){ return i.refBase === base; });
    if(existing){
      pendingEditItem = existing;
      modalItemName.textContent = 'Edit ' + name.split(' (')[0];
      modalQty.value = existing.qty || '';
      modalBrand.value = existing.brand || '';
      modalConfirm.textContent = 'Update';
      modalRemove.style.display = 'block';
    }else{
      pendingEditItem = null;
      modalItemName.textContent = 'Add ' + name.split(' (')[0];
      modalQty.value = '';
      modalBrand.value = '';
      modalConfirm.textContent = 'Add to list';
      modalRemove.style.display = 'none';
    }
    modalOverlay.classList.add('open');
    setTimeout(function(){ modalQty.focus(); }, 50);
  }
  function closeQtyModal(){
    modalOverlay.classList.remove('open');
    pendingRefName = null;
    pendingEditItem = null;
  }
  modalCancel.onclick = closeQtyModal;
  modalOverlay.onclick = function(e){ if(e.target === modalOverlay) closeQtyModal(); };
  modalRemove.onclick = function(){
    if(!pendingEditItem) return;
    deleteItem(pendingEditItem.id);
    showToast('Removed from list');
    closeQtyModal();
    renderRefChips();
  };
  modalConfirm.onclick = function(){
    if(!pendingRefName) return;
    var base = normalize(pendingRefName.split(' (')[0]);
    var brand = modalBrand.value.trim();
    var qty = modalQty.value.trim();
    var displayName = pendingRefName;
    var finalText = displayName;
    if(brand) finalText += ' - ' + brand;
    if(qty) finalText += ' - ' + qty;

    if(pendingEditItem){
      pendingEditItem.text = finalText;
      pendingEditItem.brand = brand;
      pendingEditItem.qty = qty;
      saveItems();
      showToast('Updated ' + finalText);
    }else{
      items.unshift({ id: uid(), text: finalText, done: false, refBase: base, brand: brand, qty: qty });
      logAdded(displayName);
      logAddEvent(finalText);
      saveItems();
      showToast('Added ' + finalText);
    }
    render();
    closeQtyModal();
  };
  modalQty.addEventListener('keydown', function(e){ if(e.key === 'Enter') modalConfirm.click(); });
  modalBrand.addEventListener('keydown', function(e){ if(e.key === 'Enter') modalConfirm.click(); });

  refBtn.onclick = function(){
    refPanel.classList.toggle('open');
    if(refPanel.classList.contains('open')){ renderRefTabs(); renderRefChips(); }
  };

  function pad2(n){ return n < 10 ? '0' + n : '' + n; }

  function renderCalendar(){
    var year = calDate.getFullYear(), month = calDate.getMonth();
    calMonthLabel.textContent = calDate.toLocaleDateString(undefined, { month:'long', year:'numeric' });
    calGrid.innerHTML = '';
    ['S','M','T','W','T','F','S'].forEach(function(d){
      var h = document.createElement('div');
      h.className = 'cal-dow';
      h.textContent = d;
      calGrid.appendChild(h);
    });
    var firstDay = new Date(year, month, 1).getDay();
    var daysInMonth = new Date(year, month+1, 0).getDate();
    var eventDates = {};
    addEvents.forEach(function(e){ eventDates[e.date] = true; });
    var today = todayISO();
    for(var i=0; i<firstDay; i++){
      var blank = document.createElement('div');
      calGrid.appendChild(blank);
    }
    for(var d=1; d<=daysInMonth; d++){
      var iso = year + '-' + pad2(month+1) + '-' + pad2(d);
      var cell = document.createElement('button');
      var cls = 'cal-day';
      if(eventDates[iso]) cls += ' has-event';
      if(iso === today) cls += ' is-today';
      if(iso === selectedDay) cls += ' selected';
      cell.className = cls;
      cell.textContent = d;
      cell.onclick = (function(isoCopy){
        return function(){ selectedDay = isoCopy; renderCalendar(); renderDayItems(); };
      })(iso);
      calGrid.appendChild(cell);
    }
  }

  function renderDayItems(){
    calDayItems.innerHTML = '';
    if(!selectedDay) return;
    var label = document.createElement('div');
    label.className = 'cal-day-label';
    var dLocal = new Date(selectedDay + 'T00:00:00');
    label.textContent = dLocal.toLocaleDateString(undefined, { weekday:'long', month:'short', day:'numeric' });
    calDayItems.appendChild(label);
    var dayEvents = addEvents.filter(function(e){ return e.date === selectedDay; });
    if(dayEvents.length === 0){
      var none = document.createElement('div');
      none.className = 'no-history';
      none.textContent = 'No items added on this day.';
      calDayItems.appendChild(none);
      return;
    }
    dayEvents.forEach(function(e){
      var row = document.createElement('div');
      row.className = 'month-item-row';
      row.innerHTML = '<span>' + e.text + '</span>';
      calDayItems.appendChild(row);
    });
  }

  calPrev.onclick = function(){ calDate.setMonth(calDate.getMonth() - 1); renderCalendar(); };
  calNext.onclick = function(){ calDate.setMonth(calDate.getMonth() + 1); renderCalendar(); };

  historyBtn.onclick = function(){
    historyPanel.classList.toggle('open');
    if(historyPanel.classList.contains('open')){
      renderHistory();
      renderCalendar();
    }
  };

  function renderHistory(){
    historyListEl.innerHTML = '';
    if(history.length === 0){
      historyListEl.innerHTML = '<div class="no-history">Nothing bought yet. Once you start ticking off items, your months will show up here.</div>';
      return;
    }
    var byMonth = {};
    history.forEach(function(h){
      var mk = monthKey(h.date);
      if(!byMonth[mk]) byMonth[mk] = {};
      if(!byMonth[mk][h.name]) byMonth[mk][h.name] = { text: h.text, count: 0 };
      byMonth[mk][h.name].count += 1;
      byMonth[mk][h.name].text = h.text;
    });
    var months = Object.keys(byMonth).sort().reverse();
    months.forEach(function(mk, idx){
      var block = document.createElement('div');
      block.className = 'month-block' + (idx === 0 ? ' open' : '');
      var head = document.createElement('div');
      head.className = 'month-head';
      head.innerHTML = '<span>' + monthLabel(mk) + '</span><span class="chev">\u25be</span>';
      head.onclick = function(){ block.classList.toggle('open'); };
      var body = document.createElement('div');
      body.className = 'month-items';
      var names = Object.keys(byMonth[mk]).sort();
      names.forEach(function(n){
        var row = document.createElement('div');
        row.className = 'month-item-row';
        row.innerHTML = '<span>' + byMonth[mk][n].text + '</span><span>\u00d7' + byMonth[mk][n].count + '</span>';
        body.appendChild(row);
      });
      block.appendChild(head);
      block.appendChild(body);
      historyListEl.appendChild(block);
    });
  }

  loadAll();
})();
</script>
</body>
</html>
