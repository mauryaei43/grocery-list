<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Confirm Order - PARCHI</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF6EC; --card:#FFFFFF; --leaf:#2D5016; --leaf-light:#4a7a2a;
    --tomato:#C1440E; --turmeric:#E8A33D; --charcoal:#2B2B2B; --sage:#E4EEDC; --line:#E5DFCF; --muted:#8A8677;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Nunito',sans-serif; background:var(--bg); color:var(--charcoal); padding-bottom:40px;}
  header{background:var(--leaf); color:#fff; padding:20px; border-radius:0 0 20px 20px;}
  header h1{margin:0; font-size:19px; font-weight:800;}
  header p{margin:4px 0 0; font-size:13px; color:#cfe0bf; font-weight:600;}
  main{max-width:480px; margin:0 auto; padding:16px;}
  .shop-card{
    background:var(--card); border:2px solid var(--line); border-radius:14px;
    padding:14px; margin-bottom:16px; font-size:14px; font-weight:700;
  }
  .shop-card div{color:var(--muted); font-weight:600; font-size:13px; margin-top:2px;}
  .items-card{
    background:var(--card); border:2px solid var(--line); border-radius:14px;
    padding:14px; margin-bottom:16px;
  }
  .item-line{
    display:flex; justify-content:space-between; font-size:14px; padding:5px 0;
    border-bottom:1px solid var(--line);
  }
  .item-line:last-child{border-bottom:none;}
  .item-line span:last-child{color:var(--muted); font-weight:700;}
  .total-row{
    display:flex; justify-content:space-between; align-items:center; background:var(--sage);
    border-radius:14px; padding:14px 16px; font-weight:800; font-size:18px; color:var(--leaf); margin-bottom:20px;
  }
  .confirm-q{font-size:15px; font-weight:800; margin-bottom:12px; text-align:center;}
  #yesBtn{
    width:100%; height:54px; border-radius:16px; border:none; background:var(--leaf);
    color:#fff; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit; margin-bottom:10px;
  }
  #yesBtn:active{background:var(--leaf-light);}
  #noBtn{
    width:100%; height:54px; border-radius:16px; border:2px solid var(--tomato); background:#fff;
    color:var(--tomato); font-size:16px; font-weight:800; cursor:pointer; font-family:inherit;
  }
  #noBtn:active{background:#fbe1d6;}
  #copyBtn{
    width:100%; height:46px; border-radius:16px; border:2px solid var(--line); background:var(--card);
    color:var(--muted); font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:12px;
  }
  .empty{text-align:center; color:var(--muted); font-weight:600; padding:40px 20px;}
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--leaf); color:#fff;
    padding:10px 20px; border-radius:999px; font-size:14px; font-weight:700; opacity:0;
    transition:opacity .25s ease; pointer-events:none; white-space:nowrap;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <h1>Confirm your order</h1>
  <p>Review the price and let the shop know if you'd like to proceed</p>
</header>

<main>
  <div id="shopCard" class="shop-card" style="display:none;"></div>
  <div id="itemsCard" class="items-card" style="display:none;"></div>
  <div id="totalRow" class="total-row" style="display:none;">
    <span>Total</span>
    <span id="totalAmount">\u20b90</span>
  </div>
  <div id="actionArea" style="display:none;">
    <div class="confirm-q">Do you want to confirm this order?</div>
    <button id="yesBtn">\u2713 Yes, confirm order</button>
    <button id="noBtn">\u2715 No, cancel order</button>
    <button id="copyBtn" style="display:none;">Copy reply message instead</button>
  </div>
  <div id="emptyMsg" class="empty" style="display:none;">This confirmation link looks incomplete or has expired.</div>
</main>

<div class="toast" id="toast"></div>

<script>
(function(){
  function b64DecodeUnicode(str){
    return decodeURIComponent(Array.prototype.map.call(atob(str), function(c){
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
  }

  var toastEl = document.getElementById('toast');
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(function(){ toastEl.classList.remove('show'); }, 1800);
  }
  function esc(s){
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  var params = new URLSearchParams(window.location.search);
  var d = params.get('d');
  var data = null;
  try{
    if(d) data = JSON.parse(b64DecodeUnicode(d));
  }catch(e){ data = null; }

  var shopCard = document.getElementById('shopCard');
  var itemsCard = document.getElementById('itemsCard');
  var totalRow = document.getElementById('totalRow');
  var totalAmount = document.getElementById('totalAmount');
  var actionArea = document.getElementById('actionArea');
  var yesBtn = document.getElementById('yesBtn');
  var noBtn = document.getElementById('noBtn');
  var copyBtn = document.getElementById('copyBtn');
  var emptyMsg = document.getElementById('emptyMsg');

  if(!data || typeof data.total === 'undefined'){
    emptyMsg.style.display = 'block';
  }else{
    if(data.shopName){
      shopCard.innerHTML = '<div style="font-size:15px;">From: ' + esc(data.shopName) + '</div>';
      shopCard.style.display = 'block';
    }
    if(data.items && data.items.length){
      var html = '';
      data.items.forEach(function(it){
        html += '<div class="item-line"><span>' + esc(it.n) + (it.q ? (' (' + esc(it.q) + ')') : '') + '</span><span>\u20b9' + it.a + '</span></div>';
      });
      itemsCard.innerHTML = html;
      itemsCard.style.display = 'block';
    }
    totalAmount.textContent = '\u20b9' + data.total;
    totalRow.style.display = 'flex';
    actionArea.style.display = 'block';

    var mobile = (data.shopMobile || '').replace(/[^0-9]/g, '');
    if(mobile.length === 10) mobile = '91' + mobile;
    var hasMobile = mobile.length >= 11;
    if(!hasMobile) copyBtn.style.display = 'block';

    function sendReply(confirmed){
      var text = (confirmed ? 'Order confirmed! Please dispatch the items.' : 'Sorry, please cancel this order.') +
        '\nTotal: \u20b9' + data.total +
        (data.customerName ? ('\nFrom: ' + data.customerName) : '');
      if(hasMobile){
        window.location.href = 'https://wa.me/' + mobile + '?text=' + encodeURIComponent(text);
      }else{
        navigator.clipboard.writeText(text).then(function(){
          showToast('Copied — paste it in your reply to the shop');
        }).catch(function(){
          showToast('Could not copy automatically.');
        });
      }
    }

    yesBtn.onclick = function(){ sendReply(true); };
    noBtn.onclick = function(){ sendReply(false); };
    copyBtn.onclick = function(){
      navigator.clipboard.writeText('Total: \u20b9' + data.total).then(function(){
        showToast('Copied to clipboard');
      }).catch(function(){});
    };
  }
})();
</script>
</body>
</html>
