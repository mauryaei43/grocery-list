<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Order - PARCHI</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF6EC; --card:#FFFFFF; --leaf:#2D5016; --leaf-light:#4a7a2a;
    --tomato:#C1440E; --turmeric:#E8A33D; --charcoal:#2B2B2B; --sage:#E4EEDC; --line:#E5DFCF; --muted:#8A8677;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Nunito',sans-serif; background:var(--bg); color:var(--charcoal); padding-bottom:40px;}
  header{background:var(--leaf); color:#fff; padding:20px; border-radius:0 0 20px 20px;}
  header h1{margin:0; font-size:19px; font-weight:800;}
  header p{margin:4px 0 0; font-size:13px; color:#cfe0bf; font-weight:600;}
  main{max-width:480px; margin:0 auto; padding:16px;}
  .from-card{
    background:var(--card); border:2px solid var(--line); border-radius:14px;
    padding:12px 14px; margin-bottom:16px; font-size:14px; font-weight:700;
  }
  .from-card div{color:var(--muted); font-weight:600; font-size:13px; margin-top:2px;}
  .shop-fields-card{
    background:var(--sage); border-radius:14px; padding:12px 14px; margin-bottom:16px;
  }
  .shop-fields-label{font-size:12px; font-weight:700; color:var(--leaf); margin-bottom:8px;}
  .shop-fields-card input{
    width:100%; height:42px; border-radius:10px; border:2px solid var(--line);
    padding:0 12px; font-size:14px; font-family:inherit; margin-bottom:8px; background:#fff;
  }
  .shop-fields-card input:last-child{margin-bottom:0;}
  .shop-fields-card input:focus{outline:none; border-color:var(--leaf-light);}
  .cat-label{
    font-size:12px; font-weight:800; color:var(--leaf); text-transform:uppercase;
    letter-spacing:0.03em; margin:16px 0 8px;
  }
  .item-row{
    display:flex; align-items:center; gap:10px; background:var(--card);
    border:2px solid var(--line); border-radius:14px; padding:10px 12px; margin-bottom:8px;
  }
  .item-name{flex:1; font-size:15px; font-weight:700; min-width:0;}
  .item-qty{
    width:64px; height:42px; border-radius:10px; border:2px solid var(--line);
    padding:0 8px; font-size:14px; font-family:inherit; text-align:center;
  }
  .item-qty:focus{outline:none; border-color:var(--leaf-light);}
  .item-amount{
    width:80px; height:42px; border-radius:10px; border:2px solid var(--line);
    padding:0 10px; font-size:15px; font-family:inherit; text-align:right;
  }
  .item-amount:focus{outline:none; border-color:var(--leaf-light);}
  .total-row{
    display:flex; justify-content:space-between; align-items:center; background:var(--sage);
    border-radius:14px; padding:14px 16px; font-weight:800; font-size:18px; color:var(--leaf); margin:18px 0;
  }
  #sendBtn{
    width:100%; height:54px; border-radius:16px; border:none; background:var(--leaf);
    color:#fff; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit;
  }
  #sendBtn:active{background:var(--leaf-light);}
  #copyBtn{
    width:100%; height:48px; border-radius:16px; border:2px solid var(--line); background:var(--card);
    color:var(--muted); font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:10px;
  }
  .empty{text-align:center; color:var(--muted); font-weight:600; padding:40px 20px;}
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--leaf); color:#fff;
    padding:10px 20px; border-radius:999px; font-size:14px; font-weight:700; opacity:0;
    transition:opacity .25s ease; pointer-events:none; white-space:nowrap;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <h1>Order request</h1>
  <p id="subLabel">Enter prices below and send the total back</p>
</header>

<main>
  <div id="fromCard" class="from-card" style="display:none;"></div>
  <div id="shopFieldsCard" class="shop-fields-card" style="display:none;">
    <div class="shop-fields-label">Your shop name / number (optional, needed so the customer's confirmation reaches you)</div>
    <input id="shopName" type="text" placeholder="Shop name" />
    <input id="shopMobile" type="tel" placeholder="Your WhatsApp number" />
  </div>
  <div id="itemsArea"></div>
  <div id="totalRow" class="total-row" style="display:none;">
    <span>Total</span>
    <span id="totalAmount">\u20b90</span>
  </div>
  <button id="sendBtn" style="display:none;">Send total on WhatsApp</button>
  <button id="copyBtn" style="display:none;">Copy reply message instead</button>
  <div id="emptyMsg" class="empty" style="display:none;">This order link looks incomplete or has expired. Please ask for a fresh link.</div>
</main>

<div class="toast" id="toast"></div>

<script>
(function(){
  function b64DecodeUnicode(str){
    return decodeURIComponent(Array.prototype.map.call(atob(str), function(c){
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
  }
  function b64EncodeUnicode(str){
    return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1){
      return String.fromCharCode('0x' + p1);
    }));
  }

  var toastEl = document.getElementById('toast');
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(function(){ toastEl.classList.remove('show'); }, 1800);
  }

  var params = new URLSearchParams(window.location.search);
  var d = params.get('d');
  var data = null;
  try{
    if(d) data = JSON.parse(b64DecodeUnicode(decodeURIComponent(d)));
  }catch(e){ data = null; }

  var itemsArea = document.getElementById('itemsArea');
  var fromCard = document.getElementById('fromCard');
  var shopFieldsCard = document.getElementById('shopFieldsCard');
  var shopName = document.getElementById('shopName');
  var shopMobile = document.getElementById('shopMobile');
  var totalRow = document.getElementById('totalRow');
  var totalAmount = document.getElementById('totalAmount');
  var sendBtn = document.getElementById('sendBtn');
  var copyBtn = document.getElementById('copyBtn');
  var emptyMsg = document.getElementById('emptyMsg');

  if(!data || !data.cats || Object.keys(data.cats).length === 0){
    emptyMsg.style.display = 'block';
  }else{
    if(data.name || data.mobile || data.address){
      var bits = [];
      if(data.name) bits.push('<div style="font-size:15px;">From: ' + esc(data.name) + '</div>');
      if(data.mobile) bits.push('<div>Mobile: ' + esc(data.mobile) + '</div>');
      if(data.address) bits.push('<div>Address: ' + esc(data.address) + '</div>');
      fromCard.innerHTML = bits.join('');
      fromCard.style.display = 'block';
    }
    shopFieldsCard.style.display = 'block';

    Object.keys(data.cats).forEach(function(cat){
      var label = document.createElement('div');
      label.className = 'cat-label';
      label.textContent = cat;
      itemsArea.appendChild(label);
      data.cats[cat].forEach(function(itemText, idx){
        var row = document.createElement('div');
        row.className = 'item-row';
        var name = document.createElement('div');
        name.className = 'item-name';
        name.textContent = itemText;
        var qty = document.createElement('input');
        qty.className = 'item-qty';
        qty.type = 'text';
        qty.placeholder = 'Qty';
        qty.dataset.name = itemText;
        var amt = document.createElement('input');
        amt.className = 'item-amount';
        amt.type = 'number';
        amt.inputMode = 'decimal';
        amt.placeholder = '\u20b9';
        amt.addEventListener('input', updateTotal);
        amt.dataset.name = itemText;
        row.appendChild(name);
        row.appendChild(qty);
        row.appendChild(amt);
        itemsArea.appendChild(row);
      });
    });

    totalRow.style.display = 'flex';
    sendBtn.style.display = 'block';
    copyBtn.style.display = 'block';
    updateTotal();
  }

  function esc(s){
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function updateTotal(){
    var total = 0;
    itemsArea.querySelectorAll('.item-amount').forEach(function(inp){
      var v = parseFloat(inp.value);
      if(!isNaN(v)) total += v;
    });
    totalAmount.textContent = '\u20b9' + (Math.round(total * 100) / 100);
  }

  async function shortenUrl(longUrl){
    try{
      var resp = await fetch('https://is.gd/create.php?format=simple&url=' + encodeURIComponent(longUrl));
      if(!resp.ok) throw new Error('bad response');
      var text = (await resp.text()).trim();
      if(text.indexOf('https://is.gd/') === 0 || text.indexOf('http://is.gd/') === 0) return text;
      throw new Error('invalid short url');
    }catch(e){
      return longUrl;
    }
  }

  async function buildReplyText(){
    var lines = ['Price reply' + (data.name ? (' for ' + data.name) : '') + ':', ''];
    var total = 0;
    var itemsForConfirm = [];
    itemsArea.querySelectorAll('.item-row').forEach(function(row){
      var amtInp = row.querySelector('.item-amount');
      var qtyInp = row.querySelector('.item-qty');
      if(!amtInp) return;
      var v = parseFloat(amtInp.value);
      var qtyVal = qtyInp ? qtyInp.value.trim() : '';
      if(!isNaN(v) && v > 0){
        var line = amtInp.dataset.name;
        if(qtyVal) line += ' - Qty: ' + qtyVal;
        line += ' - \u20b9' + v;
        lines.push(line);
        total += v;
        itemsForConfirm.push({ n: amtInp.dataset.name, q: qtyVal, a: v });
      }
    });
    total = Math.round(total * 100) / 100;
    lines.push('');
    lines.push('Total: \u20b9' + total);
    lines.push('');
    lines.push('Thank you so much for choosing us for your shopping!');

    if(total > 0){
      var confirmPayload = {
        shopName: shopName.value.trim(),
        shopMobile: shopMobile.value.trim(),
        customerName: data.name || '',
        total: total,
        items: itemsForConfirm
      };
      var encoded = encodeURIComponent(b64EncodeUnicode(JSON.stringify(confirmPayload)));
      var confirmUrl = new URL('confirm.html', window.location.href).href + '?d=' + encoded;
      var shortConfirmUrl = await shortenUrl(confirmUrl);
      lines.push('');
      lines.push('Please find pricing and total amount: ' + shortConfirmUrl);
    }
    return lines.join('\n');
  }

  sendBtn.onclick = async function(){
    sendBtn.disabled = true;
    showToast('Preparing your reply...');
    var text = await buildReplyText();
    sendBtn.disabled = false;
    var mobile = (data.mobile || '').replace(/[^0-9]/g, '');
    if(mobile.length === 10) mobile = '91' + mobile;
    if(mobile.length >= 11){
      window.location.href = 'https://wa.me/' + mobile + '?text=' + encodeURIComponent(text);
    }else{
      showToast('No valid mobile number was shared. Use "Copy reply" instead.');
    }
  };

  copyBtn.onclick = async function(){
    var text = await buildReplyText();
    try{
      await navigator.clipboard.writeText(text);
      showToast('Copied — paste it in your reply message');
    }catch(e){
      showToast('Could not copy automatically.');
    }
  };
})();
</script>
</body>
</html>
